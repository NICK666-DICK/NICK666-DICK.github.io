<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3公里咖啡地图</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#121212;color:#fff;text-align:center;padding:15px;}
        h1{color:#d4af37;margin-bottom:15px;letter-spacing:2px;}
        #map{width:98%;height:78vh;margin:0 auto;border-radius:12px;border:2px solid #333;}
        .back-btn{margin:20px 0;display:inline-block;padding:12px 35px;background:#d4af37;color:#000;text-decoration:none;border-radius:8px;font-weight:bold;}
        /* 自定义弹窗样式 */
        .pop-box{
            line-height:1.6;
            font-size:14px;
            color:#333;
        }
    </style>
</head>
<body>
    <h1>方圆3公里 · 全量咖啡地图 ☕</h1>
    <div id="map"></div>
    <a class="back-btn" href=" ">返回主页</a >

    <script>
    // 精准浙大紫金港校区中心坐标
    const centerLat = 30.3028
    const centerLon = 120.0818
    const searchRadius = 2000

    const map = L.map('map').setView([centerLat, centerLon], 14)

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:''
    }).addTo(map)

    // 绘制三公里范围金色圈层
    L.circle([centerLat, centerLon], {
        radius: searchRadius,
        color:'#d4af37',
        fillColor:'#d4af37',
        fillOpacity:0.08
    }).addTo(map)

    // 抓取周边全部咖啡店 附带详细简介
    const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="cafe"](around:${searchRadius},${centerLat},${centerLon});out;`
    
    fetch(overpassUrl)
    .then(res=>res.json())
    .then(data=>{
        data.elements.forEach(shop=>{
            let shopName = shop.tags.name || "小众隐秘咖啡店";
            let brandInfo = shop.tags.brand || "独立私人咖啡馆";
            let openTime = shop.tags.opening_hours || "全天正常营业";
            let feature = shop.tags.description || "环境安静静谧，适合静坐小憩，品鉴醇香咖啡。";

            // 拼接完整文字简介弹窗
            let popHtml = `
            <div class="pop-box">
                <h3>${shopName}</h3>
                <p>门店类型：${brandInfo}</p >
                <p>营业时间：${openTime}</p >
                <p>店铺简介：${feature}</p >
            </div>
            `
            L.marker([shop.lat, shop.lon])
            .addTo(map)
            .bindPopup(popHtml)
        })
    })
    </script>
</body>
</html>
