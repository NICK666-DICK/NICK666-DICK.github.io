<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>浙大紫金港 · 咖啡地图</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 🔥 所有Leaflet样式全部内联，零外部依赖 -->
    <style>
        .leaflet-pane, .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow, .leaflet-tile-container, .leaflet-pane>svg, .leaflet-pane>canvas, .leaflet-zoom-box, .leaflet-image-layer, .leaflet-layer {
            position: absolute;
            left: 0;
            top: 0;
        }
        .leaflet-container {
            overflow: hidden;
        }
        .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .leaflet-marker-icon, .leaflet-marker-shadow {
            display: block;
        }
        .leaflet-container img {
            max-width: none !important;
        }
        .leaflet-container .leaflet-control-attribution {
            background: rgba(255,255,255,0.7);
            margin: 0;
        }
        .leaflet-control {
            position: relative;
            z-index: 800;
            pointer-events: visiblePainted;
            pointer-events: auto;
        }
        .leaflet-top, .leaflet-bottom {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
        }
        .leaflet-top {
            top: 0;
        }
        .leaflet-right {
            right: 0;
        }
        .leaflet-bottom {
            bottom: 0;
        }
        .leaflet-left {
            left: 0;
        }
        .leaflet-control {
            float: left;
            clear: both;
        }
        .leaflet-right .leaflet-control {
            float: right;
        }
        .leaflet-top .leaflet-control {
            margin-top: 10px;
        }
        .leaflet-bottom .leaflet-control {
            margin-bottom: 10px;
        }
        .leaflet-left .leaflet-control {
            margin-left: 10px;
        }
        .leaflet-right .leaflet-control {
            margin-right: 10px;
        }
        .leaflet-control-zoom {
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            font: bold 18px 'Lucida Console', Monaco, monospace;
            text-indent: 1px;
            text-align: center;
            text-decoration: none;
            color: black;
            width: 26px;
            height: 26px;
            line-height: 26px;
            display: block;
        }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
            background-color: #f4f4f4;
        }
        .leaflet-popup {
            position: absolute;
            text-align: center;
            margin-bottom: 20px;
        }
        .leaflet-popup-content-wrapper {
            padding: 1px;
            text-align: left;
            border-radius: 12px;
        }
        .leaflet-popup-content {
            margin: 13px 19px;
            line-height: 1.4;
        }
        .leaflet-popup-tip-container {
            width: 40px;
            height: 20px;
            position: absolute;
            left: 50%;
            margin-left: -20px;
            overflow: hidden;
            pointer-events: none;
        }
        .leaflet-popup-tip {
            width: 17px;
            height: 17px;
            padding: 1px;
            margin: -10px auto 0;
            transform: rotate(45deg);
            background: white;
        }
        .leaflet-container a {
            color: #0078A8;
        }
        .leaflet-container a.leaflet-popup-close-button {
            position: absolute;
            top: 0;
            right: 0;
            padding: 4px 4px 0 0;
            text-align: center;
            width: 18px;
            height: 14px;
            font: 16px/14px Tahoma, Verdana, sans-serif;
            color: #c3c3c3;
            text-decoration: none;
            font-weight: bold;
            background: transparent;
        }
        .leaflet-container a.leaflet-popup-close-button:hover {
            color: #999;
        }

        /* 自定义样式 */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#121212;color:#fff;text-align:center;padding:15px;}
        h1{color:#d4af37;margin-bottom:15px;letter-spacing:2px;}
        #map{width:98%;height:78vh;margin:0 auto;border-radius:12px;border:2px solid #333;}
        .back-btn{margin:20px 0;display:inline-block;padding:12px 35px;background:#d4af37;color:#000;text-decoration:none;border-radius:8px;font-weight:bold;}
        .coffee-popup{min-width:240px;max-width:300px;line-height:1.7;font-family:Arial,sans-serif;}
        .popup-img{width:100%;height:130px;object-fit:cover;border-radius:6px 6px 0 0;margin-bottom:8px;}
        .popup-header{background:#d4af37;color:#000;padding:8px 12px;border-radius:0 0 6px 6px;font-weight:bold;font-size:16px;}
        .popup-body{padding:12px;background:#fff;color:#333;border-radius:0 0 6px 6px;}
        .popup-row{margin:8px 0;padding-bottom:6px;border-bottom:1px solid #eee;}
        .popup-label{color:#888;font-size:12px;display:block;}
        .popup-value{font-size:14px;margin-top:2px;}
        .rating-stars{color:#ffc107;font-size:16px;}
    </style>
</head>
<body>
    <h1>浙大紫金港方圆2公里 · 咖啡地图 ☕</h1>
    <div id="map"></div>
    <a class="back-btn" href="./index.html">返回主页</a>

    <!-- 🔥 Leaflet核心代码全部内联，零外部依赖 -->
    <script>
    (function(){
        var L = {};
        L.version = '1.9.4';
        L.Util = {
            extend: function(dest) {
                for (var i = 1; i < arguments.length; i++) {
                    var src = arguments[i];
                    for (var j in src) {
                        dest[j] = src[j];
                    }
                }
                return dest;
            },
            bind: function(fn, obj) {
                return function() {
                    return fn.apply(obj, arguments);
                };
            },
            stamp: function(obj) {
                obj._leaflet_id = obj._leaflet_id || ++L.Util.lastId;
                return obj._leaflet_id;
            },
            lastId: 0
        };

        L.Class = function(){};
        L.Class.extend = function(props) {
            var NewClass = function() {
                if (this.initialize) {
                    this.initialize.apply(this, arguments);
                }
            };
            NewClass.prototype = Object.create(this.prototype);
            L.Util.extend(NewClass.prototype, props);
            NewClass.extend = this.extend;
            return NewClass;
        };

        L.LatLng = L.Class.extend({
            initialize: function(lat, lng) {
                this.lat = +lat;
                this.lng = +lng;
            },
            equals: function(other) {
                return Math.abs(this.lat - other.lat) < 1e-9 && Math.abs(this.lng - other.lng) < 1e-9;
            }
        });
        L.latLng = function(lat, lng) {
            return new L.LatLng(lat, lng);
        };

        L.Point = L.Class.extend({
            initialize: function(x, y) {
                this.x = +x;
                this.y = +y;
            },
            add: function(p) {
                return new L.Point(this.x + p.x, this.y + p.y);
            },
            subtract: function(p) {
                return new L.Point(this.x - p.x, this.y - p.y);
            },
            multiplyBy: function(num) {
                return new L.Point(this.x * num, this.y * num);
            },
            divideBy: function(num) {
                return new L.Point(this.x / num, this.y / num);
            },
            round: function() {
                return new L.Point(Math.round(this.x), Math.round(this.y));
            }
        });
        L.point = function(x, y) {
            return new L.Point(x, y);
        };

        L.Bounds = L.Class.extend({
            initialize: function(a, b) {
                if (!a) return;
                var points = b ? [a, b] : a;
                for (var i = 0, len = points.length; i < len; i++) {
                    this.extend(points[i]);
                }
            },
            extend: function(point) {
                point = L.point(point);
                if (!this.min && !this.max) {
                    this.min = point.clone();
                    this.max = point.clone();
                } else {
                    this.min.x = Math.min(point.x, this.min.x);
                    this.max.x = Math.max(point.x, this.max.x);
                    this.min.y = Math.min(point.y, this.min.y);
                    this.max.y = Math.max(point.y, this.max.y);
                }
                return this;
            },
            getCenter: function() {
                return new L.Point(
                    (this.min.x + this.max.x) / 2,
                    (this.min.y + this.max.y) / 2);
            },
            getSize: function() {
                return new L.Point(
                    this.max.x - this.min.x,
                    this.max.y - this.min.y);
            }
        });

        L.Projection = {
            SphericalMercator: {
                R: 6378137,
                project: function(latlng) {
                    var d = Math.PI / 180,
                        max = 85.0511287798,
                        lat = Math.max(Math.min(max, latlng.lat), -max),
                        sin = Math.sin(lat * d);
                    return new L.Point(
                        this.R * latlng.lng * d,
                        this.R * Math.log((1 + sin) / (1 - sin)) / 2);
                },
                unproject: function(point) {
                    var d = 180 / Math.PI;
                    return new L.LatLng(
                        (2 * Math.atan(Math.exp(point.y / this.R)) - Math.PI / 2) * d,
                        point.x * d / this.R);
                }
            }
        };

        L.CRS = {
            EPSG3857: {
                projection: L.Projection.SphericalMercator,
                transformation: new (L.Class.extend({
                    initialize: function(a, b, c, d) {
                        this._a = a;
                        this._b = b;
                        this._c = c;
                        this._d = d;
                    },
                    transform: function(point, scale) {
                        scale = scale || 1;
                        return new L.Point(
                            scale * (this._a * point.x + this._b),
                            scale * (this._c * point.y + this._d));
                    },
                    untransform: function(point, scale) {
                        scale = scale || 1;
                        return new L.Point(
                            (point.x / scale - this._b) / this._a,
                            (point.y / scale - this._d) / this._c);
                    }
                }))(0.5 / Math.PI, 0.5, -0.5 / Math.PI, 0.5),
                scale: function(zoom) {
                    return 256 * Math.pow(2, zoom);
                },
                latLngToPoint: function(latlng, zoom) {
                    var projectedPoint = this.projection.project(latlng);
                    return this.transformation.transform(projectedPoint, this.scale(zoom));
                },
                pointToLatLng: function(point, zoom) {
                    var untransformedPoint = this.transformation.untransform(point, this.scale(zoom));
                    return this.projection.unproject(untransformedPoint);
                }
            }
        };

        L.Map = L.Class.extend({
            initialize: function(id, options) {
                this._container = document.getElementById(id);
                this.options = L.Util.extend({
                    crs: L.CRS.EPSG3857,
                    zoom: 10,
                    center: [0, 0],
                    zoomControl: true
                }, options);
                this._initContainer();
                this._initEvents();
                if (this.options.zoomControl) {
                    this.addControl(new L.Control.Zoom());
                }
                if (options.center && options.zoom !== undefined) {
                    this.setView(options.center, options.zoom);
                }
            },
            _initContainer: function() {
                this._container.className += ' leaflet-container';
                this._paneRoot = document.createElement('div');
                this._paneRoot.className = 'leaflet-pane';
                this._container.appendChild(this._paneRoot);
                this._panes = {};
                this._createPane('tilePane', this._paneRoot);
                this._createPane('markerPane', this._paneRoot);
                this._createPane('popupPane', this._paneRoot);
            },
            _createPane: function(name, container) {
                var pane = document.createElement('div');
                pane.className = 'leaflet-pane leaflet-' + name;
                container.appendChild(pane);
                this._panes[name] = pane;
                return pane;
            },
            _initEvents: function() {
                this._container.addEventListener('click', L.Util.bind(this._onClick, this));
                this._container.addEventListener('mousedown', L.Util.bind(this._onMouseDown, this));
                this._container.addEventListener('wheel', L.Util.bind(this._onWheel, this));
                window.addEventListener('resize', L.Util.bind(this.invalidateSize, this));
            },
            _onClick: function(e) {
                var point = L.point(e.clientX, e.clientY);
                var latlng = this.containerPointToLatLng(this._getContainerPoint(point));
                this.fire('click', {latlng: latlng, containerPoint: point});
            },
            _onMouseDown: function(e) {
                if (e.button !== 0) return;
                this._dragging = true;
                this._startPoint = L.point(e.clientX, e.clientY);
                this._startCenter = this.getCenter();
                document.addEventListener('mousemove', this._onMouseMove = L.Util.bind(this._onMouseMove, this));
                document.addEventListener('mouseup', this._onMouseUp = L.Util.bind(this._onMouseUp, this));
            },
            _onMouseMove: function(e) {
                if (!this._dragging) return;
                var point = L.point(e.clientX, e.clientY);
                var delta = point.subtract(this._startPoint);
                var centerPoint = this.latLngToContainerPoint(this._startCenter);
                var newCenterPoint = centerPoint.subtract(delta);
                this.setView(this.containerPointToLatLng(newCenterPoint), this.getZoom());
            },
            _onMouseUp: function() {
                this._dragging = false;
                document.removeEventListener('mousemove', this._onMouseMove);
                document.removeEventListener('mouseup', this._onMouseUp);
            },
            _onWheel: function(e) {
                e.preventDefault();
                var delta = e.deltaY > 0 ? -1 : 1;
                var zoom = Math.max(0, Math.min(18, this.getZoom() + delta));
                var point = L.point(e.clientX, e.clientY);
                var latlng = this.containerPointToLatLng(this._getContainerPoint(point));
                this.setView(latlng, zoom);
            },
            _getContainerPoint: function(clientPoint) {
                var rect = this._container.getBoundingClientRect();
                return clientPoint.subtract(L.point(rect.left, rect.top));
            },
            setView: function(center, zoom) {
                this._center = L.latLng(center);
                this._zoom = zoom;
                this._resetView();
                return this;
            },
            getCenter: function() {
                return this._center;
            },
            getZoom: function() {
                return this._zoom;
            },
            setZoom: function(zoom) {
                return this.setView(this.getCenter(), zoom);
            },
            _resetView: function() {
                this.fire('viewreset');
            },
            latLngToContainerPoint: function(latlng) {
                var crs = this.options.crs;
                var projectedPoint = crs.latLngToPoint(latlng, this.getZoom());
                var centerPoint = crs.latLngToPoint(this.getCenter(), this.getZoom());
                var size = this.getSize();
                return projectedPoint.subtract(centerPoint).add(size.divideBy(2)).round();
            },
            containerPointToLatLng: function(point) {
                var crs = this.options.crs;
                var size = this.getSize();
                var centerPoint = crs.latLngToPoint(this.getCenter(), this.getZoom());
                var projectedPoint = point.subtract(size.divideBy(2)).add(centerPoint);
                return crs.pointToLatLng(projectedPoint, this.getZoom());
            },
            getSize: function() {
                return L.point(this._container.clientWidth, this._container.clientHeight);
            },
            invalidateSize: function() {
                this._resetView();
                return this;
            },
            addLayer: function(layer) {
                layer.addTo(this);
                return this;
            },
            removeLayer: function(layer) {
                layer.remove();
                return this;
            },
            addControl: function(control) {
                control.addTo(this);
                return this;
            },
            fire: function(type, data) {
                if (!this._events) return;
                var events = this._events[type];
                if (!events) return;
                for (var i = 0, len = events.length; i < len; i++) {
                    events[i].fn.call(events[i].ctx || this, data || {});
                }
            },
            on: function(type, fn, ctx) {
                this._events = this._events || {};
                this._events[type] = this._events[type] || [];
                this._events[type].push({fn: fn, ctx: ctx});
                return this;
            }
        });
        L.map = function(id, options) {
            return new L.Map(id, options);
        };

        L.TileLayer = L.Class.extend({
            initialize: function(url, options) {
                this._url = url;
                this.options = L.Util.extend({
                    tileSize: 256,
                    minZoom: 0,
                    maxZoom: 18
                }, options);
            },
            addTo: function(map) {
                this._map = map;
                this._container = document.createElement('div');
                this._container.className = 'leaflet-tile-container';
                map._panes.tilePane.appendChild(this._container);
                map.on('viewreset', this._update, this);
                this._update();
                return this;
            },
            remove: function() {
                this._map.off('viewreset', this._update, this);
                this._container.parentNode.removeChild(this._container);
                return this;
            },
            _update: function() {
                this._container.innerHTML = '';
                var map = this._map;
                var zoom = map.getZoom();
                if (zoom < this.options.minZoom || zoom > this.options.maxZoom) return;
                var size = map.getSize();
                var bounds = new L.Bounds([
                    map.containerPointToLatLng(L.point(0, 0)),
                    map.containerPointToLatLng(size)
                ]);
                var tileSize = this.options.tileSize;
                var crs = map.options.crs;
                var scale = crs.scale(zoom);
                var nw = crs.latLngToPoint(bounds.min, zoom);
                var se = crs.latLngToPoint(bounds.max, zoom);
                var tileBounds = new L.Bounds([
                    nw.divideBy(tileSize).floor(),
                    se.divideBy(tileSize).ceil()
                ]);
                for (var x = tileBounds.min.x; x <= tileBounds.max.x; x++) {
                    for (var y = tileBounds.min.y; y <= tileBounds.max.y; y++) {
                        this._addTile(x, y, zoom);
                    }
                }
            },
            _addTile: function(x, y, zoom) {
                var tile = document.createElement('img');
                tile.className = 'leaflet-tile';
                tile.style.position = 'absolute';
                tile.style.width = this.options.tileSize + 'px';
                tile.style.height = this.options.tileSize + 'px';
                var tileSize = this.options.tileSize;
                var crs = this._map.options.crs;
                var scale = crs.scale(zoom);
                var point = L.point(x * tileSize, y * tileSize);
                var latlng = crs.pointToLatLng(point, zoom);
                var containerPoint = this._map.latLngToContainerPoint(latlng);
                tile.style.left = containerPoint.x + 'px';
                tile.style.top = containerPoint.y + 'px';
                tile.src = this._url.replace('{x}', x).replace('{y}', y).replace('{z}', zoom);
                this._container.appendChild(tile);
            }
        });
        L.tileLayer = function(url, options) {
            return new L.TileLayer(url, options);
        };

        L.Circle = L.Class.extend({
            initialize: function(latlng, options) {
                this._latlng = L.latLng(latlng);
                this.options = L.Util.extend({
                    color: '#3388ff',
                    weight: 3,
                    opacity: 1,
                    fillColor: '#3388ff',
                    fillOpacity: 0.2,
                    radius: 10
                }, options);
            },
            addTo: function(map) {
                this._map = map;
                this._container = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                this._container.setAttribute('width', '100%');
                this._container.setAttribute('height', '100%');
                this._container.style.position = 'absolute';
                this._container.style.top = '0';
                this._container.style.left = '0';
                this._container.style.pointerEvents = 'none';
                map._panes.markerPane.appendChild(this._container);
                this._path = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                this._path.setAttribute('stroke', this.options.color);
                this._path.setAttribute('stroke-width', this.options.weight);
                this._path.setAttribute('stroke-opacity', this.options.opacity);
                this._path.setAttribute('fill', this.options.fillColor);
                this._path.setAttribute('fill-opacity', this.options.fillOpacity);
                this._container.appendChild(this._path);
                map.on('viewreset', this._update, this);
                this._update();
                return this;
            },
            remove: function() {
                this._map.off('viewreset', this._update, this);
                this._container.parentNode.removeChild(this._container);
                return this;
            },
            _update: function() {
                var point = this._map.latLngToContainerPoint(this._latlng);
                var radius = this.options.radius / (40075017 * Math.cos(this._latlng.lat * Math.PI / 180) / Math.pow(2, this._map.getZoom() + 8)) * 256;
                this._path.setAttribute('cx', point.x);
                this._path.setAttribute('cy', point.y);
                this._path.setAttribute('r', radius);
            }
        });
        L.circle = function(latlng, options) {
            return new L.Circle(latlng, options);
        };

        L.Marker = L.Class.extend({
            initialize: function(latlng, options) {
                this._latlng = L.latLng(latlng);
                this.options = L.Util.extend({
                    icon: null
                }, options);
            },
            addTo: function(map) {
                this._map = map;
                this._icon = document.createElement('div');
                if (this.options.icon) {
                    this._icon.innerHTML = this.options.icon.html;
                    this._icon.style.width = this.options.icon.options.iconSize[0] + 'px';
                    this._icon.style.height = this.options.icon.options.iconSize[1] + 'px';
                    this._icon.style.marginLeft = -this.options.icon.options.iconAnchor[0] + 'px';
                    this._icon.style.marginTop = -this.options.icon.options.iconAnchor[1] + 'px';
                }
                this._icon.style.position = 'absolute';
                this._icon.style.cursor = 'pointer';
                map._panes.markerPane.appendChild(this._icon);
                this._icon.addEventListener('click', L.Util.bind(this._onClick, this));
                map.on('viewreset', this._update, this);
                this._update();
                return this;
            },
            remove: function() {
                this._map.off('viewreset', this._update, this);
                this._icon.parentNode.removeChild(this._icon);
                if (this._popup) {
                    this._popup.remove();
                }
                return this;
            },
            _update: function() {
                var point = this._map.latLngToContainerPoint(this._latlng);
                this._icon.style.left = point.x + 'px';
                this._icon.style.top = point.y + 'px';
            },
            _onClick: function(e) {
                e.stopPropagation();
                if (this._popup) {
                    this._popup.setLatLng(this._latlng).openOn(this._map);
                }
                this.fire('click', {latlng: this._latlng});
            },
            bindPopup: function(html, options) {
                this._popup = new L.Popup(options);
                this._popup.setContent(html);
                return this;
            },
            fire: function(type, data) {
                if (!this._events) return;
                var events = this._events[type];
                if (!events) return;
                for (var i = 0, len = events.length; i < len; i++) {
                    events[i].fn.call(events[i].ctx || this, data || {});
                }
            },
            on: function(type, fn, ctx) {
                this._events = this._events || {};
                this._events[type] = this._events[type] || [];
                this._events[type].push({fn: fn, ctx: ctx});
                return this;
            }
        });
        L.marker = function(latlng, options) {
            return new L.Marker(latlng, options);
        };

        L.DivIcon = L.Class.extend({
            initialize: function(options) {
                this.options = L.Util.extend({
                    className: '',
                    html: '',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41]
                }, options);
            }
        });
        L.divIcon = function(options) {
            return new L.DivIcon(options);
        };

        L.Popup = L.Class.extend({
            initialize: function(options) {
                this.options = L.Util.extend({
                    maxWidth: 300
                }, options);
            },
            setContent: function(content) {
                this._content = content;
                return this;
            },
            setLatLng: function(latlng) {
                this._latlng = L.latLng(latlng);
                return this;
            },
            openOn: function(map) {
                if (map._popup) {
                    map._popup.close();
                }
                map._popup = this;
                this._map = map;
                this._container = document.createElement('div');
                this._container.className = 'leaflet-popup';
                this._container.style.zIndex = 1000;
                var wrapper = document.createElement('div');
                wrapper.className = 'leaflet-popup-content-wrapper';
                var content = document.createElement('div');
                content.className = 'leaflet-popup-content';
                content.innerHTML = this._content;
                content.style.maxWidth = this.options.maxWidth + 'px';
                wrapper.appendChild(content);
                var closeButton = document.createElement('a');
                closeButton.className = 'leaflet-popup-close-button';
                closeButton.href = '#';
                closeButton.innerHTML = '×';
                closeButton.addEventListener('click', L.Util.bind(function(e) {
                    e.preventDefault();
                    this.close();
                }, this));
                wrapper.appendChild(closeButton);
                this._container.appendChild(wrapper);
                var tipContainer = document.createElement('div');
                tipContainer.className = 'leaflet-popup-tip-container';
                var tip = document.createElement('div');
                tip.className = 'leaflet-popup-tip';
                tipContainer.appendChild(tip);
                this._container.appendChild(tipContainer);
                map._panes.popupPane.appendChild(this._container);
                map.on('viewreset', this._update, this);
                this._update();
                return this;
            },
            close: function() {
                if (!this._map) return;
                this._map.off('viewreset', this._update, this);
                this._container.parentNode.removeChild(this._container);
                this._map._popup = null;
                this._map = null;
            },
            _update: function() {
                var point = this._map.latLngToContainerPoint(this._latlng);
                this._container.style.left = point.x + 'px';
                this._container.style.top = (point.y - 20) + 'px';
            }
        });
        L.popup = function(options) {
            return new L.Popup(options);
        };

        L.Control = L.Class.extend({
            initialize: function(options) {
                L.Util.extend(this.options, options);
            },
            addTo: function(map) {
                this._map = map;
                this._container = this.onAdd(map);
                var position = this.options.position || 'topleft';
                var corner = map._container.querySelector('.leaflet-' + position);
                if (!corner) {
                    corner = document.createElement('div');
                    corner.className = 'leaflet-control-container leaflet-' + position;
                    map._container.appendChild(corner);
                }
                corner.appendChild(this._container);
                return this;
            },
            remove: function() {
                this._container.parentNode.removeChild(this._container);
                return this;
            }
        });

        L.Control.Zoom = L.Control.extend({
            options: {
                position: 'topleft'
            },
            onAdd: function(map) {
                var container = document.createElement('div');
                container.className = 'leaflet-control-zoom';
                var zoomIn = document.createElement('a');
                zoomIn.href = '#';
                zoomIn.className = 'leaflet-control-zoom-in';
                zoomIn.innerHTML = '+';
                zoomIn.addEventListener('click', function(e) {
                    e.preventDefault();
                    map.setZoom(map.getZoom() + 1);
                });
                container.appendChild(zoomIn);
                var zoomOut = document.createElement('a');
                zoomOut.href = '#';
                zoomOut.className = 'leaflet-control-zoom-out';
                zoomOut.innerHTML = '−';
                zoomOut.addEventListener('click', function(e) {
                    e.preventDefault();
                    map.setZoom(map.getZoom() - 1);
                });
                container.appendChild(zoomOut);
                return container;
            }
        });

        window.L = L;
    })();
    </script>
