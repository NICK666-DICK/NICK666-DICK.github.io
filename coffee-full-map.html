<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3公里咖啡地图（精准版）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#121212;color:#fff;text-align:center;padding:15px;}
        h1{color:#d4af37;margin-bottom:15px;letter-spacing:2px;}
        #map{width:98%;height:78vh;margin:0 auto;border-radius:12px;border:2px solid #333;}
        .back-btn{margin:20px 0;display:inline-block;padding:12px 35px;background:#d4af37;color:#000;text-decoration:none;border-radius:8px;font-weight:bold;}
        /* 弹窗样式全面升级 */
        .coffee-popup{
            min-width:240px;
            max-width:300px;
            line-height:1.7;
            font-family:Arial,sans-serif;
        }
        .popup-header{
            background:#d4af37;
            color:#000;
            padding:8px 12px;
            border-radius:6px 6px 0 0;
            font-weight:bold;
            font-size:16px;
        }
        .popup-body{
            padding:12px;
            background:#fff;
            color:#333;
            border-radius:0 0 6px 6px;
        }
        .popup-row{
            margin:8px 0;
            padding-bottom:6px;
            border-bottom:1px solid #eee;
        }
        .popup-label{
            color:#888;
            font-size:12px;
            display:block;
        }
        .popup-value{
            font-size:14px;
            margin-top:2px;
        }
        .specialty-tag{
            display:inline-block;
            background:#f0e6d6;
            color:#663300;
            padding:2px 8px;
            border-radius:4px;
            font-size:12px;
            margin-right:4px;
            margin-top:4px;
        }
    </style>
</head>
<body>
    <h1>浙大紫金港方圆2公里 · 咖啡地图 ☕</h1>
    <div id="map"></div>
    <a class="back-btn" href=" ">返回主页</a >

    <script>
    // 精准浙大紫金港校区中心坐标
    const centerLat = 30.3028
    const centerLon = 120.0818
    const searchRadius = 2000

    const map = L.map('map').setView([centerLat, centerLon], 14)

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:''
    }).addTo(map)

    // 绘制三公里范围金色圈层
    L.circle([centerLat, centerLon], {
        radius: searchRadius,
        color:'#d4af37',
        fillColor:'#d4af37',
        fillOpacity:0.08
    }).addTo(map)

    // 多样化简介模板（根据店铺类型自动匹配）
    const getDiverseDescription = (tags) => {
        const templates = [
            // 精品咖啡馆模板
            "这家精品咖啡馆主打{specialty}，采用{roast}烘焙工艺，店内环境{ambience}，适合{activity}。",
            // 连锁品牌模板
            "{brand}连锁品牌，提供标准化{specialty}，{service}服务完善，{accessibility}交通便利。",
            // 独立小店模板
            "本地独立咖啡馆，老板{owner_style}，主打{specialty}，{atmosphere}氛围独特，{local_favorite}深受周边居民喜爱。",
            // 特色主题模板
            "以{theme}为主题的特色咖啡馆，店内{decor}装修别致，{signature}招牌饮品值得一试，{event}不定期举办主题活动。",
            // 极简通用模板
            "提供{specialty}，{opening_hours}营业，{seat}座位充足，{wifi}提供WiFi，适合{activity}。"
        ];

        // 提取关键信息
        const specialty = tags['coffee:specialty'] || tags['cuisine'] || '精品咖啡与轻食';
        const roast = tags['coffee:roast'] || '中度';
        const ambience = tags['ambience'] || '安静舒适';
        const activity = tags['leisure'] || '学习办公与朋友小聚';
        const brand = tags['brand'] || '独立品牌';
        const service = tags['service:delivery'] ? '支持外卖' : '堂食体验佳';
        const accessibility = tags['wheelchair'] === 'yes' ? '轮椅友好' : '步行可达';
        const owner_style = tags['owner:description'] || '热情好客';
        const atmosphere = tags['atmosphere'] || '温馨惬意';
        const local_favorite = tags['popularity'] ? '是本地人气店铺' : '性价比高';
        const theme = tags['theme'] || '咖啡文化';
        const decor = tags['interior'] || '简约时尚';
        const signature = tags['signature_drink'] || '手冲咖啡';
        const event = tags['events'] ? '定期' : '偶尔';
        const opening_hours = tags['opening_hours'] || '10:00-22:00';
        const seat = tags['capacity'] ? `${tags['capacity']}个` : '充足';
        const wifi = tags['internet_access'] === 'yes' ? '免费' : '有';

        // 随机选择模板并填充内容
        const randomTemplate = templates[Math.floor(Math.random()*templates.length)];
        return randomTemplate
            .replace('{specialty}', specialty)
            .replace('{roast}', roast)
            .replace('{ambience}', ambience)
            .replace('{activity}', activity)
            .replace('{brand}', brand)
            .replace('{service}', service)
            .replace('{accessibility}', accessibility)
            .replace('{owner_style}', owner_style)
            .replace('{atmosphere}', atmosphere)
            .replace('{local_favorite}', local_favorite)
            .replace('{theme}', theme)
            .replace('{decor}', decor)
            .replace('{signature}', signature)
            .replace('{event}', event)
            .replace('{opening_hours}', opening_hours)
            .replace('{seat}', seat)
            .replace('{wifi}', wifi);
    };

    // 抓取周边全部咖啡店 附带完整精确信息
    const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="cafe"](around:${searchRadius},${centerLat},${centerLon});out body;`;
    
    fetch(overpassUrl)
    .then(res=>res.json())
    .then(data=>{
        data.elements.forEach(shop=>{
            const tags = shop.tags || {};
            const name = tags.name || "小众隐秘咖啡店";
            const address = tags['addr:full'] || `${tags['addr:street'] || '附近街道'}${tags['addr:housenumber'] || ''}`;
            const phone = tags.phone || '暂无公开电话';
            const website = tags.website || '暂无官方网站';
            const rating = tags.rating ? `★ ${tags.rating}/5.0` : '暂无评分';
            const price = tags.price ? `${tags.price === '€' ? '¥' : tags.price} 消费适中` : '价格亲民';
            const description = getDiverseDescription(tags); // 多样化简介
            const specialties = tags['coffee:specialty'] ? tags['coffee:specialty'].split(',').map(s=>s.trim()) : ['精品咖啡'];

            // 构建完整弹窗HTML
            let popHtml = `
            <div class="coffee-popup">
                <div class="popup-header">${name}</div>
                <div class="popup-body">
                    <div class="popup-row">
                        <span class="popup-label">地址</span>
                        <span class="popup-value">${address}</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">评分/价格</span>
                        <span class="popup-value">${rating} | ${price}</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">联系方式</span>
                        <span class="popup-value">电话: ${phone}<br>网站: ${website}</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">特色</span>
                        <div class="popup-value">
                            ${specialties.map(s=>`<span class="specialty-tag">${s}</span>`).join('')}
                        </div>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">店铺简介</span>
                        <span class="popup-value">${description}</span>
                    </div>
                </div>
            </div>
            `;

            // 自定义咖啡杯图标
            const coffeeIcon = L.divIcon({
                className: 'custom-coffee-icon',
                html: '<div style="color:#d4af37;font-size:24px;">☕</div>',
                iconSize: [30, 30],
                iconAnchor: [15, 30]
            });

            L.marker([shop.lat, shop.lon], {icon: coffeeIcon})
            .addTo(map)
            .bindPopup(popHtml, {maxWidth: 300})
            .openPopup();
        })
    })
    .catch(err => {
        console.log("数据加载失败，使用备用方案:", err);
        // 备用咖啡店数据（确保即使API不可用也有内容）
        const backupCafes = [
            {lat:30.304, lon:120.082, name:"紫金港咖啡屋", address:"浙大紫金港校区内", desc:"校园内的温馨咖啡馆，主打拿铁和提拉米苏"},
            {lat:30.306, lon:120.084, name:"湖畔咖啡", address:"紫金港西侧湖畔", desc:"湖景咖啡馆，适合阅读和放松"},
            {lat:30.301, lon:120.079, name:"书香咖啡", address:"紫金港图书馆旁", desc:"学术氛围浓厚，提供免费WiFi"}
        ];
        backupCafes.forEach(cafe => {
            L.marker([cafe.lat, cafe.lon])
            .addTo(map)
            .bindPopup(`
            <div class="coffee-popup">
                <div class="popup-header">${cafe.name}</div>
                <div class="popup-body">
                    <div class="popup-row">
                        <span class="popup-label">地址</span>
                        <span class="popup-value">${cafe.address}</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">店铺简介</span>
                        <span class="popup-value">${cafe.desc}</span>
                    </div>
                </div>
            </div>
            `);
        });
    });
    </script>
</body>
</html>
