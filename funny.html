<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全新创意网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: #ffffff;
            font-family: 微软雅黑;
            text-align: center;
        }
        h1 {
            color: #d4af37;
            padding: 80px 0;
            letter-spacing: 2px;
            font-weight: normal;
        }
        button{
            background:#d4af37;
            border:none;
            padding:15px 50px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover{
            background: #b9962c;
        }
    </style>
</head>
<body>
    <h1>全新网页 待开发</h1>
    <button>请按</button>
</body>
</html>
