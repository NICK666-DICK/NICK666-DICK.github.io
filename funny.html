<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千万别乱按</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            min-height: 100vh;
            font-family: 微软雅黑;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #d4af37;
            margin-bottom: 80px;
            letter-spacing: 2px;
        }
        .main-btn{
            background:#d4af37;
            border:none;
            padding:20px 80px;
            border-radius:10px;
            font-size:20px;
            font-weight:bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .main-btn:hover{
            background: #b9962c;
            transform: scale(1.05);
        }
        .scary-pop{
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .scary-img{
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>没事不要乱点</h1>
    <button class="main-btn">请按</button>

    <div class="scary.jpg">
        <!-- 直接在线调用你的这张照片，不用自己上传 -->
        < img class="scary-img" src="https://p9-flow-image-sign.byteimg.com/tos-cn-i-a9r32ns0r0/fa06.jpeg">
    </div>

    <script>
        const btn = document.querySelector('.main-btn')
        const pop = document.querySelector('.scary-pop')
        // 恐怖尖叫音效
        const scarySound = new Audio('https://www.myinstants.com/media/sounds/jumpscare-scream.mp3')

        btn.addEventListener('click', ()=>{
            pop.style.display = 'flex'
            scarySound.volume = 1
            scarySound.play().catch(()=>{})
        })

        // 点击任意位置关闭
        pop.addEventListener('click', ()=>{
            pop.style.display = 'none'
        })
    </script>
</body>
</html>
